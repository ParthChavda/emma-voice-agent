services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emma
      POSTGRES_PASSWORD: emma
      POSTGRES_DB: emma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - qdrant

volumes:
  postgres_data:
  qdrant_data:
